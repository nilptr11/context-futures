[strategy]
id = "fallback"
name = "breakout_atr"

[risk]
initial_equity = 10000.0
risk_fraction = 0.02
max_symbol_notional_fraction = 5.0
max_total_notional_fraction = 8.0
leverage = 20
margin_type = "ISOLATED"
taker_fee_rate = 0.0005
slippage_rate = 0.0002

[binance]
base_url = "https://fapi.binance.com"
recv_window = 5000

[[strategies]]
id = "brooks_breakout_research_btc_1h"
name = "brooks_price_action"
symbols = ["BTCUSDT"]
fast_interval = "1h"
slow_interval = "4h"

[strategies.breakout]
atr_period = 14

[strategies.trade]
stop_atr_multiple = 1.5
trail_atr_multiple = 2.5
profit_target_r_multiple = 2.0

[strategies.trend]
fast_ema = 50
slow_ema = 200

[strategies.execution]
funding_abs_limit = 0.0005

[strategies.price_action]
enabled = true

[strategies.brooks.regime]
always_in_threshold = 0.80
range_score_max = 0.55
climax_score_max = 0.80

[strategies.brooks.setups.trend_pullback]
entry_ema = 20
lookback = 12
min_depth_atr = 1.2
max_depth_atr = 4.0
ema_touch_atr = 0.6
require_ema_touch = true
min_legs = 2
min_signal_score = 0.75
enabled = true

[strategies.brooks.setups.breakout_pullback]
enabled = true
min_quality_score = 0.65
min_retest_score = 0.60
min_control_score = 0.70
min_control_gap = 0.70
bear_max_bull_control = 0.60
bull_probability_base = 0.16
bear_probability_base = 0.10
bear_min_probability_score = 0.85
bear_min_edge_score_r = 0.85

[strategies.brooks.setups.failed_breakout]
enabled = false
min_trap_score = 0.45
min_break_distance_atr = 0.35
entry_edge_zone = 0.45
min_range_quality_score = 0.50
min_reversal_score = 0.45
max_opposite_control = 0.68
min_two_sided_score = 0.35
min_probability_score = 0.68
min_edge_score_r = 0.50
trading_range_edge_zone = 0.25

[strategies.brooks.trader_equation]
min_context_score = 0.55
min_setup_score = 0.45
min_signal_score = 0.60
min_target_room_r = 1.50
min_probability_score = 0.52
min_edge_score_r = 0.00
cost_r = 0.05

[strategies.brooks.trade_plan]
structural_stop_buffer_atr = 0.10
structural_stop_min_atr = 0.80
structural_stop_max_atr = 4.50
measured_move_target_fraction = 1.00

[strategies.brooks.evidence]
funding_crowding_threshold = 0.0
funding_extreme_threshold = 0.0003
funding_crowding_context_penalty = 0.25
funding_crowding_probability_penalty = 0.15
taker_buy_crowding_threshold = 0.58
taker_sell_crowding_threshold = 0.42
taker_crowding_extreme_distance = 0.18
open_interest_crowding_threshold = 0.002
open_interest_crowding_extreme = 0.020
external_crowding_context_penalty = 0.10
external_crowding_probability_penalty = 0.08

